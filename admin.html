<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Store Management Panel</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 30px; }
        .panel-box { border: 2px solid #ffd700; padding: 20px; border-radius: 8px; max-width: 600px; margin: 0 auto; }
        input { padding: 8px; margin: 5px; width: 80%; }
        button { background: #ffd700; color:#000; border:none; padding:10px 15px; cursor:pointer; font-weight:bold;}
    </style>
</head>
<body>

    <div class="panel-box">
        <h2>🎛️ Store Owner Control Center</h2>
        <hr style="border-color: #ffd700;">
        
        <h3>Adjust Item Stock Balances</h3>
        <label>Select Product ID (1 to 22):</label><br>
        <input type="number" id="prod-id" min="1" max="22" value="1"><br>
        
        <label>Set Total Available Stock Count:</label><br>
        <input type="number" id="stock-count" value="50"><br><br>
        
        <button onclick="updateInventoryLevel()">Save New Stock Values</button>
        <p id="status-log" style="color: #00ff00;"></p>
    </div>

    <script>
        function updateInventoryLevel() {
            const id = document.getElementById('prod-id').value;
            const count = document.getElementById('stock-count').value;
            
            // Updating local mock browser store database directly
            localStorage.setItem(`stock_prod_${id}`, count);
            document.getElementById('status-log').innerText = `Success: Product #${id} stock adjusted to ${count} units.`;
        }
    </script>
</body>
</html>
