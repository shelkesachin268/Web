
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhagwati Divine | Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="hero-section">
        <div class="divine-overlay">
            <div class="om-logo">ॐ</div>
            <h1>Awaken Divine Energy In Your Home</h1>
            <p>Bring peace, positivity, and spiritual vibrations into your daily life.</p>
            <a href="products.html" class="btn-primary">View All 22 Chanting Machines</a>
        </div>
    </header>

    <section class="altar-container">
        <div class="deepak">
            <div class="flame"></div>
            <div class="lamp-base"></div>
        </div>
        
        <div class="agarbatti">
            <div class="smoke-container">
                <span class="smoke-line s-1"></span>
                <span class="smoke-line s-2"></span>
                <span class="smoke-line s-3"></span>
            </div>
            <div class="stick"></div>
        </div>
    </section>

    <section class="product-overview-section">
        <h2>Featured Spiritual Collections</h2>
        <div class="horizontal-scroll-container" id="featured-products">
            <div class="product-card" onclick="navigateToProduct(1)">
                <span class="tag best-seller">Best Seller</span>
                <img src="https://via.placeholder.com/250" alt="Mantra Machine 1">
                <h3>Akhand Maha Mantra Machine</h3>
                <p class="price"><span class="mrp">₹999</span> ₹499</p>
            </div>
            <div class="product-card" onclick="navigateToProduct(2)">
                <img src="https://via.placeholder.com/250" alt="Mantra Machine 2">
                <h3>Devi Bhakti Chanting Player</h3>
                <p class="price"><span class="mrp">₹1199</span> ₹599</p>
            </div>
            </div>
    </section>

    <script src="js/app.js"></script>
</body>
</html>
